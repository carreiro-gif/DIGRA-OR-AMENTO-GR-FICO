<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamento Gráfico • DIGRA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            digra: {
              dark: '#0f172a',
              blue: '#1e3a8a',
              light: '#f1f5f9',
              accent: '#0ea5e9',
              danger: '#ef4444',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    
    body {
      background-color: #f8fafc;
    }

    /* ============================= */
    /* CORREÇÃO DEFINITIVA DE PRINT  */
    /* ============================= */

    @media print {

      @page {
        size: A4 portrait;
        margin: 10mm;
      }

      html, body {
        height: auto !important;
        overflow: visible !important;
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Remove limite de largura que corta conteúdo */
      #root,
      main,
      section,
      div {
        max-width: 100% !important;
      }

      /* Remove min-height que causa corte */
      .min-h-screen {
        min-height: auto !important;
      }

      /* Remove overflow que corta partes */
      .overflow-hidden,
      .overflow-auto,
      .overflow-scroll {
        overflow: visible !important;
      }

      /* Grid e flex no print podem cortar conteúdo */
      .grid {
        display: block !important;
      }

      .flex {
        flex-direction: column !important;
      }

      /* Evita quebrar blocos no meio */
      .page-break-avoid,
      section,
      .card,
      .shadow,
      .rounded-xl {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
      }

      /* Oculta botões e elementos não imprimíveis */
      .no-print,
      button {
        display: none !important;
      }

      /* Inputs viram texto simples */
      input, textarea, select {
        border: none !important;
        background: transparent !important;
        padding: 0 !important;
        resize: none;
      }

      /* Remove scrollbars */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Imagens não podem estourar página */
      img {
        max-width: 100% !important;
        height: auto !important;
        page-break-inside: avoid;
      }
    }
  </style>

<script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
