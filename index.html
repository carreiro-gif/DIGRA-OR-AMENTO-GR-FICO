<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamento Gráfico • DIGRA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            digra: {
              dark: '#0f172a',
              blue: '#1e3a8a',
              light: '#f1f5f9',
              accent: '#0ea5e9',
              danger: '#ef4444',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    
    body {
      background-color: #f8fafc;
    }

    /* ============================= */
    /* CORREÇÃO DEFINITIVA DE PRINT  */
    /* ============================= */

    @media print {

  @page {
    size: A4 portrait;
    margin: 8mm;
  }

  html, body {
    background: white !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    height: auto !important;
    overflow: visible !important;
  }

  /* Ocultar botões e controles */
  .no-print,
  button,
  header {
    display: none !important;
  }

  /* === CORREÇÃO PRINCIPAL === */
  /* Remover backdrop-blur e sombras que criam blocos invisíveis */
  * {
    -webkit-backdrop-filter: none !important;
    backdrop-filter: none !important;
    box-shadow: none !important;
  }

  /* Garantir que nenhum container herde altura da viewport */
  .print-area,
  .print-area * {
    overflow: visible !important;
    height: auto !important;
    max-height: none !important;
    min-height: 0 !important;
    position: static !important;
    float: none !important;
  }

  /* Exceção: manter grid/flex funcionando */
  .print-area [class*="grid"],
  .print-area [class*="flex"] {
    display: flex !important;
    flex-wrap: wrap !important;
  }

  .print-area [class*="grid-cols"] {
    display: grid !important;
  }

  /* Permitir quebra de página entre sections */
  section {
    break-inside: auto !important;
    page-break-inside: auto !important;
    break-before: auto;
    page-break-before: auto;
  }

  /* Compactação de texto */
  body {
    font-size: 11px !important;
  }
  h1 { font-size: 16px !important; }
  h2 { font-size: 14px !important; }
  h3 { font-size: 12px !important; }

  /* Inputs como texto puro */
  input, textarea, select {
    border: none !important;
    background: transparent !important;
    padding: 2px 0 !important;
    min-height: 0 !important;
    height: auto !important;
  }

  img {
    max-width: 100% !important;
    height: auto !important;
    max-height: 200px !important;
    break-inside: avoid;
  }

  /* Container principal sem restrições */
  main {
    max-width: 100% !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  /* Resumo financeiro legível */
  .grid-cols-12 {
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 4px !important;
  }
}

</script>

<link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
